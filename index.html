<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Meta Title and Description for B2B SEO -->
    <title>PEOPLELAB X — B2B Perception Intelligence & Analyse</title>
    <meta name="description" content="PeopleLab X analyserer det billede, jeres kunder og beslutningstagere møder, før de vælger, hvilke virksomheder de vil arbejde videre med." />
    <meta name="keywords" content="B2B analyse, Reality Scan, Reality Check, Reality Roadmap, markedsanalyse, perception intelligence, beslutningsadfærd" />
    <meta name="author" content="PeopleLab X" />
    <!-- Robots Dynamic Meta Selection (Production: index, follow; Pre/Dev/Local/Subdomain: noindex, nofollow) -->
    <meta name="robots" content="noindex, nofollow" id="meta-robots" />
    <script>
      (function() {
        try {
          var host = window.location.hostname;
          var robots = document.getElementById('meta-robots');
          if (robots) {
            if (host === 'peoplelabx.dk' || host === 'www.peoplelabx.dk') {
              robots.setAttribute('content', 'index, follow');
            } else {
              robots.setAttribute('content', 'noindex, nofollow');
            }
          }
        } catch (e) {
          console.error('Robots evaluation error:', e);
        }
      })();
    </script>

    <!-- Google Search Console Verification Placeholder -->

    <!-- Canonical URL -->
